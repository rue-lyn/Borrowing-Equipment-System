<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsEQ - Sign Up</title>
    <link rel="stylesheet" href="../../styles/Signin.css">
</head>
<body>

<header>
    <img src="../../images/main-pic/logo.png" alt="Logo">
    <h1>Borrow Equipment Fast and Easy</h1>
</header>

<nav>
    <a href="#">SIGN UP NOW</a>
</nav>

<main>
    <div class="contain">
        <form class="form" id="signupForm">
            <h2>Sign Up</h2>

            <input type="email" id="signupEmail" placeholder="WMSU Email" required>

            <select id="collegeDept" required>
                <option value="" disabled selected>Select College Department</option>
                <option value="College of Computing Studies">College of Computing Studies</option>
                <option value="College of Engineering">College of Engineering</option>
            </select>

            <select id="courseSelect" required>
                <option value="" disabled selected>Select Course</option>
            </select>

            <input type="text" id="fullName" placeholder="Full Name (First & Last Name)" required>
            <input type="text" id="adviserName" placeholder="Adviser Name (First & Last Name)" required>
            <input type="text" id="studentID" placeholder="Student ID (9 Digits)" required>

            <input type="password" id="pass" placeholder="Password (8-12 characters)" required>
            <input type="password" id="confirmPass" placeholder="Confirm Password" required>

            <button type="submit">Sign Up</button>

            <p class="switch">
                Already have an account? <a href="Log-In-page.html">Login</a>
            </p>
        </form>
    </div>
</main>

<script src="../../scripts/Signup.js"></script>
</body>
</html>
