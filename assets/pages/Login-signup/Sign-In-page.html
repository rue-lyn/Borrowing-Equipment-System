<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsEQ - Sign Up</title>
    <link rel="stylesheet" href="../../styles/Signin.css">
</head>
<body>

<header>
    <img src="../../images/main-pic/logo.png" alt="Logo">
    <h1>Borrow Equipment Fast and Easy</h1>
</header>

<nav><a href="#">SIGN UP NOW</a></nav>

<main>
    <div class="contain">
        <form class="form" id="signupForm">
            <h2>Sign Up</h2>

            <div class="input-group">
                <input type="email" id="signupEmail" placeholder="WMSU Email" autocomplete="email" required>
                <span class="error-icon">!</span>
                <small class="error-text">Please enter a valid email.</small>
            </div>

            <div class="input-group">
                <select id="collegeDept" required>
                    <option value="" disabled selected>Select College Department</option>
                    <option value="College of Computing Studies">College of Computing Studies</option>
                    <option value="College of Engineering">College of Engineering</option>
                </select>
            </div>

            <div class="input-group">
                <select id="courseSelect" required>
                    <option value="" disabled selected>Select Course</option>
                </select>
            </div>

            <div class="input-group">
                <input type="text" id="fullName" placeholder="Full Name (First & Last Name)" autocomplete="name" required>
                <span class="error-icon">!</span>
                <small class="error-text">Please enter your full name.</small>
            </div>

            <div class="input-group">
                <input type="text" id="adviserName" placeholder="Adviser Name (First & Last Name)" autocomplete="off" required>
                <span class="error-icon">!</span>
                <small class="error-text">Please enter adviser's full name.</small>
            </div>

            <div class="input-group">
                <input type="text" id="studentID" placeholder="Student ID (9 Digits)" autocomplete="off" required>
                <span class="error-icon">!</span>
                <small class="error-text">Must be exactly 9 digits.</small>
            </div>

            <div class="input-group">
                <input type="password" id="pass" placeholder="Password (8-12 chars)" autocomplete="new-password" required>
                <span class="error-icon">!</span>
                <small class="error-text">Must be 8-12 characters.</small>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPass" placeholder="Confirm Password" autocomplete="new-password" required>
                <span class="error-icon">!</span>
                <small class="error-text">Passwords do not match.</small>
            </div>

            <button type="submit">Sign Up</button>

            <p class="switch">Already have an account? <a href="Log-In-page.html">Login</a></p>
        </form>
    </div>
</main>

<script src="../../scripts/Signup.js"></script>
</body>
</html>
