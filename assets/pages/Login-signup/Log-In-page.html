<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SportsEQ</title>
    <link rel="stylesheet" href="/assets/styles/Login.css">
</head>
<body>
    <header>
        <div class="header-container">
            <img src="/assets/images/Screenshot 2026-03-05 142802.png" alt="SportsEQ Logo">
            <h1>SportsEQ</h1>
        </div>
    </header>

    <main>
        <div class="contain">
            <form class="form" id="loginForm">
                <h2>Login</h2>
                <input type="email" id="userEmail" placeholder="School Email" required>
                <input type="password" id="userPass" placeholder="Password" required>
                
                <button type="submit" class="login-btn">Next: Verify Identity</button>
                
                <div class="switch">
                    <p>Don't have an account? <a href="/assets/pages/Login-signup/Sign-In-page.html">Create Account</a></p>
                </div>
            </form>
        </div>
    </main>

    <script src="/assets/js/Login.js"></script>
</body>
</html>
